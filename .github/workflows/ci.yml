name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Windows verification
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.13.1

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test cloud
        run: pnpm --filter @screenshot/cloud exec vitest run --maxWorkers=1 --minWorkers=1

      - name: Test desktop
        run: pnpm --filter @screenshot/desktop exec vitest run --maxWorkers=1 --minWorkers=1

      - name: Typecheck
        run: pnpm typecheck

      - name: Build workspaces
        run: pnpm build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
